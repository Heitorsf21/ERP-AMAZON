version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    versioning-strategy: "increase"
    labels:
      - "dependencies"
    groups:
      # Atualizacoes de patch/minor que podem ser revisadas em lote por dominio
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      radix:
        patterns:
          - "@radix-ui/*"
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
    ignore:
      # Bumps majors precisam de avaliacao manual — bloqueamos PRs automaticos
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
