# Reverse proxy para o Next.js do ERP rodando em localhost:3000.
# Substitua SEU_DOMINIO pelo dominio real (ex: erp.empresa.com.br).
# Apos copiar este arquivo, rode `certbot --nginx -d SEU_DOMINIO` para obter SSL.

upstream erp_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name SEU_DOMINIO;

    client_max_body_size 25M;

    # Acesso ao endpoint de saude sem cache, ate por HTTP.
    location /api/health {
        proxy_pass http://erp_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://erp_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_buffering off;
    }
}
