# Reverse proxy para o Next.js do ERP em localhost:3000.
# Pre-requisito: obter cert SSL via certbot ANTES de habilitar este arquivo.
#   sudo certbot certonly --nginx -d SEU_DOMINIO
#
# Substitua SEU_DOMINIO pelo dominio real (ex: erp.empresa.com.br).
# Apos copiar este arquivo:
#   ln -s /etc/nginx/sites-available/erp-erp.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

upstream erp_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── Redirect HTTP → HTTPS ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name SEU_DOMINIO;

    # Mantem o ACME challenge acessivel por HTTP (cert renew).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tudo o resto vai pra HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Servidor TLS principal ─────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name SEU_DOMINIO;

    # Certificados Let's Encrypt (ajuste o path para o seu dominio).
    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;

    # Mozilla "intermediate" — bom equilibrio compatibilidade x seguranca.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:NginxSSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS (1 ano + preload). Antes de habilitar preload, submeter dominio
    # em hstspreload.org.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Cabeçalhos de segurança redundantes ao app (defense-in-depth).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Limite de upload — alinhar com next.config (~25 MB).
    client_max_body_size 25M;

    # Health check publico sem cache.
    location /api/health {
        proxy_pass http://erp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Proxy principal.
    location / {
        proxy_pass http://erp_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_buffering off;
    }
}
